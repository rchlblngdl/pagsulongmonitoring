<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagsulong Batch 13 - Attendance System</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f1a0a 0%, #1a2a10 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Modern Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #F5E6D3 0%, #C4E0C4 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        /* Member Cards - Modern Glass */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .member-card {
            background: rgba(39, 57, 28, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px 22px;
            border: 1px solid rgba(31, 125, 83, 0.3);
            transition: all 0.3s ease;
        }

        .member-card:hover {
            transform: translateY(-2px);
            border-color: rgba(31, 125, 83, 0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .member-card h3 {
            color: #F5E6D3;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .member-card p {
            color: #9bbf8f;
            font-size: 14px;
        }

        .voice-badge {
            display: inline-block;
            background: rgba(31, 125, 83, 0.4);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 10px;
            color: #C4E0C4;
        }

        /* Modern Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 32px;
            background: rgba(39, 57, 28, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(31, 125, 83, 0.3);
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #C4E0C4;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #1F7D53;
            border-color: #1F7D53;
            color: white;
            box-shadow: 0 4px 15px rgba(31, 125, 83, 0.3);
        }

        .tab-btn:hover:not(.active) {
            border-color: #1F7D53;
            color: #F5E6D3;
        }

        /* Tab Content - Modern Glass */
        .tab-content {
            display: none;
            background: rgba(39, 57, 28, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(31, 125, 83, 0.2);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Master Controls - Modern Layout */
        .master-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
            padding: 20px;
            background: rgba(24, 35, 15, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(31, 125, 83, 0.3);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            font-weight: 500;
            color: #C4E0C4;
        }

        .control-group input,
        .control-group select {
            padding: 12px 16px;
            background: rgba(24, 35, 15, 0.8);
            border: 1px solid rgba(31, 125, 83, 0.4);
            border-radius: 14px;
            font-size: 14px;
            color: #F5E6D3;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #1F7D53;
            box-shadow: 0 0 0 3px rgba(31, 125, 83, 0.2);
        }

        /* Attendance Table - Modern */
        .attendance-table-container {
            overflow-x: auto;
            border-radius: 20px;
        }

        .attendance-input-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 20px;
            overflow: hidden;
        }

        .attendance-input-table th {
            background: rgba(31, 125, 83, 0.3);
            color: #F5E6D3;
            padding: 16px 12px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
        }

        .attendance-input-table td {
            padding: 14px 12px;
            background: rgba(24, 35, 15, 0.4);
            border-bottom: 1px solid rgba(31, 125, 83, 0.2);
        }

        .attendance-input-table select,
        .attendance-input-table input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(39, 57, 28, 0.8);
            border: 1px solid rgba(31, 125, 83, 0.4);
            border-radius: 12px;
            color: #F5E6D3;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .attendance-input-table select:focus,
        .attendance-input-table input:focus {
            outline: none;
            border-color: #1F7D53;
        }

        .member-name-cell {
            background: rgba(39, 57, 28, 0.6);
            font-weight: 500;
        }

        .member-name-cell strong {
            color: #F5E6D3;
            font-size: 15px;
        }

        .member-name-cell small {
            color: #9bbf8f;
            font-size: 12px;
        }

        /* Submit Button */
        .submit-btn {
            margin-top: 28px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1F7D53 0%, #255F38 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(31, 125, 83, 0.4);
        }

        /* Status Badges */
        .status-pf, .status-p, .status-pnf, .status-a, .status-nr {
            padding: 5px 14px;
            border-radius: 30px;
            display: inline-block;
            font-size: 13px;
            font-weight: 500;
        }
        .status-pf, .status-p { background: #1F7D53; color: white; }
        .status-pnf { background: #F4A261; color: #2C2C2C; }
        .status-a { background: #E76F51; color: white; }
        .status-nr { background: #6C6C6C; color: white; }

        /* Summary Table - Larger Fonts */
        .summary-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: rgba(24, 35, 15, 0.4);
            border-radius: 16px;
            overflow: hidden;
        }

        .summary-table th {
            background: rgba(31, 125, 83, 0.4);
            color: #F5E6D3;
            padding: 14px 10px;
            border: 1px solid rgba(31, 125, 83, 0.3);
            font-size: 14px;
            font-weight: 600;
        }

        .summary-table td {
            padding: 12px 8px;
            text-align: center;
            background: rgba(24, 35, 15, 0.5);
            color: #C4E0C4;
            border: 1px solid rgba(31, 125, 83, 0.2);
            font-size: 14px;
        }

        .summary-table td:first-child {
            background: rgba(39, 57, 28, 0.7);
            text-align: left;
            color: #F5E6D3;
            font-weight: 500;
            font-size: 14px;
        }

        .summary-table td:first-child small {
            font-size: 11px;
            color: #9bbf8f;
        }

        .complete { color: #1F7D53; font-weight: bold; font-size: 14px; }
        .incomplete { color: #F4A261; font-weight: bold; font-size: 14px; }

        /* Records Table */
        .records-container {
            overflow-x: auto;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .records-table th {
            background: rgba(31, 125, 83, 0.3);
            color: #F5E6D3;
            padding: 14px;
            border: 1px solid rgba(31, 125, 83, 0.3);
            font-size: 14px;
        }

        .records-table td {
            padding: 12px;
            background: rgba(24, 35, 15, 0.4);
            color: #C4E0C4;
            border: 1px solid rgba(31, 125, 83, 0.2);
            font-size: 13px;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            padding: 16px;
            background: rgba(24, 35, 15, 0.5);
            border-radius: 20px;
        }

        .filter-bar select, .filter-bar input {
            padding: 10px 14px;
            background: rgba(39, 57, 28, 0.8);
            border: 1px solid rgba(31, 125, 83, 0.4);
            border-radius: 12px;
            color: #F5E6D3;
            font-size: 13px;
        }

        .date-range {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .event-group {
            margin-bottom: 32px;
            padding: 20px;
            background: rgba(24, 35, 15, 0.3);
            border-radius: 20px;
        }

        .event-group h4 {
            color: #F5E6D3;
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 600;
        }

        /* Summary Header with Button */
        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .summary-header h3 {
            color: #F5E6D3;
            font-size: 22px;
            font-weight: 600;
        }

        .save-jpg-btn {
            background: linear-gradient(135deg, #1F7D53 0%, #255F38 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-jpg-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(31, 125, 83, 0.4);
        }

        .success-msg {
            background: rgba(31, 125, 83, 0.3);
            color: #C4E0C4;
            padding: 14px;
            border-radius: 14px;
            margin-top: 16px;
            text-align: center;
        }

        .error-msg {
            background: rgba(231, 111, 81, 0.3);
            color: #F5E6D3;
            padding: 14px;
            border-radius: 14px;
            margin-top: 16px;
            text-align: center;
        }

        button {
            background: #1F7D53;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        button:hover {
            background: #255F38;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .master-controls { grid-template-columns: 1fr; gap: 12px; }
            .filter-bar select, .filter-bar input { width: 100%; }
            .date-range { width: 100%; flex-direction: column; }
            .summary-header { flex-direction: column; align-items: stretch; }
            .save-jpg-btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 PAGSULONG BATCH 13</h1>
        </div>

        <div class="members-grid" id="membersGrid"></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="form">➕ Add Attendance</button>
            <button class="tab-btn" data-tab="summary">📊 Summary Report</button>
            <button class="tab-btn" data-tab="records">📝 View Records</button>
        </div>

        <!-- FORM TAB -->
        <div id="formTab" class="tab-content active">
            <h3 style="color:#F5E6D3; margin-bottom:20px; font-weight:500; font-size:20px;">📝 Record Attendance</h3>
            
            <div class="master-controls">
                <div class="control-group">
                    <label>📅 Date</label>
                    <input type="date" id="masterDate">
                </div>
                <div class="control-group">
                    <label>📂 Category</label>
                    <select id="masterCategory">
                        <option value="">-- Select Category --</option>
                        <option value="Major">🎯 MAJOR FUNCTIONS</option>
                        <option value="Minor">📋 MINOR FUNCTIONS</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>📌 Event</label>
                    <select id="masterEvent">
                        <option value="">-- Select Event --</option>
                    </select>
                </div>
            </div>

            <div class="attendance-table-container">
                <table class="attendance-input-table">
                    <thead>
                        <tr>
                            <th style="width:35%">NAME / VOICE</th>
                            <th style="width:25%">STATUS</th>
                            <th style="width:40%">REASON (if PF/NF or Absent)</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody"></tbody>
                </table>
            </div>

            <button id="submitAttendanceBtn" class="submit-btn">✅ Submit All Attendance</button>
            <div id="formMessage"></div>
        </div>

        <!-- SUMMARY TAB with Save as JPG Button -->
        <div id="summaryTab" class="tab-content">
            <div class="summary-header">
                <h3>📊 Attendance Summary Report</h3>
                <button id="saveAsJpgBtn" class="save-jpg-btn">📸 Save as JPG</button>
            </div>
            
            <div id="summaryContent">
                <div class="event-group">
                    <h4>🎯 MAJOR FUNCTIONS</h4>
                    <div class="summary-container">
                        <table class="summary-table" id="majorTable">
                            <thead id="majorHeader"></thead>
                            <tbody id="majorBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="event-group">
                    <h4>📋 MINOR FUNCTIONS</h4>
                    <div class="summary-container">
                        <table class="summary-table" id="minorTable">
                            <thead id="minorHeader"></thead>
                            <tbody id="minorBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- RECORDS TAB -->
        <div id="recordsTab" class="tab-content">
            <h3 style="color:#F5E6D3; margin-bottom:20px; font-size:20px;">📋 Attendance Records</h3>
            <div class="filter-bar">
                <select id="filterName"><option value="">All Members</option></select>
                <select id="filterCategory"><option value="">All Categories</option><option value="Major">Major Functions</option><option value="Minor">Minor Functions</option></select>
                <select id="filterEvent"><option value="">All Events</option></select>
                <div class="date-range">
                    <input type="date" id="dateFrom" placeholder="From">
                    <input type="date" id="dateTo" placeholder="To">
                </div>
                <button id="refreshRecords">🔄 Refresh</button>
                <button id="exportCSV">📥 Export CSV</button>
                <button id="deleteAll" style="background:#8B4513;">🗑️ Delete All</button>
            </div>
            <div id="recordsTable"></div>
        </div>
    </div>

    <script>
        const members = [
            { name: "Agarin, Christine", locale: "Bulihan", voice: "Soprano 2" },
            { name: "Imoria, Sheena Mae Joy", locale: "Tartaria", voice: "Soprano 2" },
            { name: "Mallari, Jennifer Victoria", locale: "Biga", voice: "Alto 1" },
            { name: "Agarin, Dione", locale: "Bulihan", voice: "Bass 1" }
        ];

        const majorEvents = ["PM", "WS", "TG", "HARANA", "COMBINED PM/WS", "LORD SUPPER", "CNY", "SPBB DAY 1", "SPBB DAY 2", "SPBB DAY 3"];
        const minorEvents = ["24/7", "LMI", "MCGI CARES", "SK EVENING", "SK AFTERNOON"];
        const statusOptions = [
            { value: "PF", label: "PF - Present Function" },
            { value: "PNF", label: "PNF - Present Not Function" },
            { value: "A", label: "A - Absent" },
            { value: "NR", label: "NR - No Report" }
        ];

        let attendanceData = [];

        function formatDate(dateStr) {
            if (!dateStr) return '';
            let d = new Date(dateStr);
            let months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
        }

        function getDayName(dateStr) {
            if (!dateStr) return '';
            let days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            return days[new Date(dateStr).getDay()];
        }

        function loadData() {
            let stored = localStorage.getItem('pagsulongAttendance');
            attendanceData = stored ? JSON.parse(stored) : [];
            renderMembers();
            populateFilters();
            renderAttendanceTable();
        }

        function saveData() {
            localStorage.setItem('pagsulongAttendance', JSON.stringify(attendanceData));
        }

        function renderMembers() {
            document.getElementById('membersGrid').innerHTML = members.map(m => `
                <div class="member-card">
                    <h3>${m.name}</h3>
                    <p>${m.locale}</p>
                    <span class="voice-badge">${m.voice}</span>
                </div>
            `).join('');
        }

        function populateFilters() {
            let filterName = document.getElementById('filterName');
            filterName.innerHTML = '<option value="">All Members</option>' + members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
        }

        function renderAttendanceTable() {
            document.getElementById('attendanceTableBody').innerHTML = members.map(m => `
                <tr>
                    <td class="member-name-cell"><strong>${m.name}</strong><br><small>${m.voice} | ${m.locale}</small></td>
                    <td><select class="status-select" data-member="${m.name}"><option value="">-- Select Status --</option>${statusOptions.map(opt => `<option value="${opt.value}">${opt.label}</option>`).join('')}</select></td>
                    <td><input type="text" class="reason-input" data-member="${m.name}" placeholder="Reason for PF/NF or Absent"></td>
                </tr>
            `).join('');
            
            document.getElementById('masterDate').valueAsDate = new Date();
            
            document.querySelectorAll('.status-select').forEach(select => {
                select.addEventListener('change', function() {
                    let reasonInput = document.querySelector(`.reason-input[data-member="${this.dataset.member}"]`);
                    if (this.value === 'PNF' || this.value === 'A') {
                        reasonInput.required = true;
                        reasonInput.placeholder = "Required: Enter reason...";
                        reasonInput.style.borderColor = "#F4A261";
                    } else {
                        reasonInput.required = false;
                        reasonInput.placeholder = "Reason for PF/NF or Absent";
                        reasonInput.style.borderColor = "rgba(31, 125, 83, 0.4)";
                    }
                });
            });
        }

        function updateMasterEventDropdown() {
            let category = document.getElementById('masterCategory').value;
            let events = category === 'Major' ? majorEvents : (category === 'Minor' ? minorEvents : []);
            let eventSelect = document.getElementById('masterEvent');
            eventSelect.innerHTML = '<option value="">-- Select Event --</option>' + events.map(e => `<option value="${e}">${e}</option>`).join('');
        }

        document.getElementById('masterCategory').addEventListener('change', updateMasterEventDropdown);

        document.getElementById('submitAttendanceBtn').addEventListener('click', () => {
            let masterDate = document.getElementById('masterDate').value;
            let masterCategory = document.getElementById('masterCategory').value;
            let masterEvent = document.getElementById('masterEvent').value;
            
            if (!masterDate || !masterCategory || !masterEvent) {
                document.getElementById('formMessage').innerHTML = '<div class="error-msg">❌ Please fill Date, Category, and Event</div>';
                setTimeout(() => document.getElementById('formMessage').innerHTML = '', 3000);
                return;
            }
            
            let errors = [];
            let submitted = 0;
            
            members.forEach(member => {
                let statusSelect = document.querySelector(`.status-select[data-member="${member.name}"]`);
                let reasonInput = document.querySelector(`.reason-input[data-member="${member.name}"]`);
                let status = statusSelect?.value;
                let reason = reasonInput?.value || '';
                
                if (!status) {
                    errors.push(`${member.name}: No status selected`);
                    return;
                }
                if ((status === 'PNF' || status === 'A') && !reason) {
                    errors.push(`${member.name}: Reason required for ${status}`);
                    return;
                }
                
                attendanceData.push({
                    name: member.name,
                    date: masterDate,
                    category: masterCategory,
                    event: masterEvent,
                    status: status === 'PF' ? 'P' : status,
                    reason: reason
                });
                submitted++;
            });
            
            if (errors.length) {
                document.getElementById('formMessage').innerHTML = `<div class="error-msg">❌ ${errors.join('<br>')}</div>`;
                setTimeout(() => document.getElementById('formMessage').innerHTML = '', 5000);
                return;
            }
            
            saveData();
            document.getElementById('formMessage').innerHTML = `<div class="success-msg">✅ ${submitted} attendance records submitted!</div>`;
            setTimeout(() => document.getElementById('formMessage').innerHTML = '', 3000);
            
            document.querySelectorAll('.status-select').forEach(s => s.value = '');
            document.querySelectorAll('.reason-input').forEach(r => r.value = '');
            renderSummary();
        });

        // RENDER SUMMARY - WITHOUT TOTAL COLUMNS
        function renderSummary() {
            renderCategorySummary('Major', majorEvents, 'majorHeader', 'majorBody');
            renderCategorySummary('Minor', minorEvents, 'minorHeader', 'minorBody');
        }

        function renderCategorySummary(category, events, headerId, bodyId) {
            // Count P (Present) per member per event
            let pCounts = {};
            members.forEach(m => { 
                pCounts[m.name] = {};
                events.forEach(e => pCounts[m.name][e] = 0);
            });
            
            attendanceData.forEach(r => {
                if (r.category === category && r.status === 'P') {
                    if (pCounts[r.name] && pCounts[r.name][r.event] !== undefined) {
                        pCounts[r.name][r.event]++;
                    }
                }
            });
            
            // Build Header - Only Event Columns + RATE + REMARKS
            document.getElementById(headerId).innerHTML = `<tr><th>NAME / VOICE</th>${events.map(e => `<th>${e}</th>`).join('')}<th>ATTENDANCE RATE</th><th>REMARKS</th></tr>`;
            
            // Build Body
            let totalPPerMember = {};
            members.forEach(m => {
                let total = 0;
                events.forEach(e => { total += pCounts[m.name][e]; });
                totalPPerMember[m.name] = total;
            });
            
            let maxPossible = events.length;
            
            document.getElementById(bodyId).innerHTML = members.map(m => {
                let totalP = totalPPerMember[m.name];
                let rate = maxPossible > 0 ? (totalP / maxPossible * 100).toFixed(1) : 0;
                let remarks = rate >= 80 ? 'COMPLETE' : 'INCOMPLETE';
                return `<tr>
                    <td><strong>${m.name}</strong><br><small>${m.voice}</small></td>
                    ${events.map(e => `<td><strong>${pCounts[m.name][e]}</strong></td>`).join('')}
                    <td><strong>${rate}%</strong></td>
                    <td class="${remarks === 'COMPLETE' ? 'complete' : 'incomplete'}">${remarks}</td>
                </tr>`;
            }).join('');
        }

        // SAVE AS JPG FUNCTION
        document.getElementById('saveAsJpgBtn')?.addEventListener('click', async function() {
            const summaryContent = document.getElementById('summaryContent');
            if (!summaryContent) return;
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = '📸 Generating...';
            this.disabled = true;
            
            try {
                const canvas = await html2canvas(summaryContent, {
                    scale: 2,
                    backgroundColor: '#18230F',
                    logging: false,
                    useCORS: true
                });
                
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                link.download = `attendance_summary_${timestamp}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Show success message
                const msgDiv = document.createElement('div');
                msgDiv.className = 'success-msg';
                msgDiv.innerHTML = '✅ Summary report saved as JPG!';
                summaryContent.parentNode.insertBefore(msgDiv, summaryContent.nextSibling);
                setTimeout(() => msgDiv.remove(), 3000);
                
            } catch (error) {
                console.error('Error generating image:', error);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-msg';
                errorDiv.innerHTML = '❌ Failed to save image. Please try again.';
                summaryContent.parentNode.insertBefore(errorDiv, summaryContent.nextSibling);
                setTimeout(() => errorDiv.remove(), 3000);
            } finally {
                this.innerHTML = originalText;
                this.disabled = false;
            }
        });

        function loadRecords() {
            let filtered = attendanceData.filter(r => {
                if (document.getElementById('filterName').value && r.name !== document.getElementById('filterName').value) return false;
                if (document.getElementById('filterCategory').value && r.category !== document.getElementById('filterCategory').value) return false;
                if (document.getElementById('filterEvent').value && r.event !== document.getElementById('filterEvent').value) return false;
                if (document.getElementById('dateFrom').value && r.date < document.getElementById('dateFrom').value) return false;
                if (document.getElementById('dateTo').value && r.date > document.getElementById('dateTo').value) return false;
                return true;
            }).sort((a,b) => new Date(b.date) - new Date(a.date));
            
            if (!filtered.length) {
                document.getElementById('recordsTable').innerHTML = '<p style="text-align:center; padding:40px;">📭 No records found</p>';
                return;
            }
            
            document.getElementById('recordsTable').innerHTML = `<div class="records-container"><table class="records-table"><thead><tr><th>DATE</th><th>NAME</th><th>CATEGORY</th><th>EVENT</th><th>STATUS</th><th>REASON</th><th>ACTION</th></tr></thead><tbody>${filtered.map((r, i) => {
                let idx = attendanceData.findIndex(x => x.name === r.name && x.date === r.date && x.event === r.event);
                let statusDisplay = r.status === 'P' ? 'PF' : r.status;
                return `<tr>
                    <td>${formatDate(r.date)}<br><span style="font-size:10px;">${getDayName(r.date)}</span></td>
                    <td>${r.name}</td>
                    <td>${r.category === 'Major' ? '🎯 Major' : '📋 Minor'}</td>
                    <td>${r.event}</td>
                    <td><span class="status-${r.status === 'P' ? 'pf' : r.status.toLowerCase()}">${statusDisplay}</span></td>
                    <td>${r.reason || '-'}</td>
                    <td><button onclick="deleteRecord(${idx})">Delete</button></td>
                </tr>`;
            }).join('')}</tbody></table></div><p style="margin-top:10px;">Total: ${filtered.length} records</p>`;
        }

        window.deleteRecord = function(idx) {
            if (confirm('Delete this record?')) {
                attendanceData.splice(idx, 1);
                saveData();
                loadRecords();
                renderSummary();
            }
        };

        function deleteAllRecords() {
            if (confirm('Delete ALL records?')) {
                attendanceData = [];
                saveData();
                loadRecords();
                renderSummary();
            }
        }

        function exportToCSV() {
            if (!attendanceData.length) return alert('No data to export');
            let csv = 'Name,Date,Category,Event,Status,Reason\n' + attendanceData.map(r => `"${r.name}","${formatDate(r.date)}","${r.category}","${r.event}","${r.status === 'P' ? 'PF' : r.status}","${r.reason || ''}"`).join('\n');
            let blob = new Blob([csv], {type: 'text/csv'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function updateFilterEvents() {
            document.getElementById('filterEvent').innerHTML = '<option value="">All Events</option>' + [...majorEvents, ...minorEvents].map(e => `<option value="${e}">${e}</option>`).join('');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                let tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(tab + 'Tab').classList.add('active');
                if (tab === 'summary') renderSummary();
                if (tab === 'records') { updateFilterEvents(); loadRecords(); }
            });
        });

        document.getElementById('refreshRecords')?.addEventListener('click', loadRecords);
        document.getElementById('exportCSV')?.addEventListener('click', exportToCSV);
        document.getElementById('deleteAll')?.addEventListener('click', deleteAllRecords);
        document.getElementById('filterName')?.addEventListener('change', loadRecords);
        document.getElementById('filterCategory')?.addEventListener('change', loadRecords);
        document.getElementById('filterEvent')?.addEventListener('change', loadRecords);
        document.getElementById('dateFrom')?.addEventListener('change', loadRecords);
        document.getElementById('dateTo')?.addEventListener('change', loadRecords);

        loadData();
        updateFilterEvents();
        renderSummary();
        updateMasterEventDropdown();
    </script>
</body>
</html>
